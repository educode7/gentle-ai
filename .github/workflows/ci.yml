name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run unit tests
        run: go test ./...

  e2e-tests:
    name: E2E Tests (${{ matrix.platform.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: ubuntu
            dockerfile: Dockerfile.ubuntu
          - name: arch
            dockerfile: Dockerfile.arch
          - name: fedora
            dockerfile: Dockerfile.fedora
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build E2E image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: e2e/${{ matrix.platform.dockerfile }}
          tags: gentle-ai-e2e-${{ matrix.platform.name }}:ci
          load: true
          cache-from: type=gha,scope=e2e-${{ matrix.platform.name }}
          cache-to: type=gha,mode=max,scope=e2e-${{ matrix.platform.name }}

      - name: Run E2E tests
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e RUN_FULL_E2E=1 \
            -e RUN_BACKUP_TESTS=1 \
            -e GITHUB_TOKEN \
            gentle-ai-e2e-${{ matrix.platform.name }}:ci
